{% extends 'base.html' %}

{% block content %}

<div class="flex flex-col items-center justify-center gap-12 px-3">
  <h1 class="text-xl font-semibold">Settings</h1>

  <section class="flex flex-col w-full max-w-[300px] sm:max-w-[350px] gap-3">
    <h2 class="text-lg font-medium">Username</h2>
    <div id="username-change-form"
         class="w-full flex flex-col items-center justify-center gap-4">
      {% include 'users/partials/username_change_form.html' %}
    </div>
    <hr class="border-gray-300">
  </section>

  <section class="flex flex-col w-full max-w-[300px] sm:max-w-[350px] gap-3">
    <h2 class="text-lg font-medium">Password</h2>
    <div id="password-change-form"
         class="w-full flex flex-col items-center justify-center gap-4">
      {% include 'users/partials/password_change_form.html' %}
    </div>
    <hr class="border-gray-300">
  </section>

  <section class="flex flex-col w-full max-w-[300px] sm:max-w-[350px] gap-3">
    <h2 class="text-lg font-medium">Profile picture</h2>
    <div id="profile-picture-change-form">
      {% include 'users/partials/profile_picture_change_form.html' %}
    </div>
    <hr class="border-gray-300">
  </section>

</div>



{% endblock content %}

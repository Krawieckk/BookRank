<nav class="bg-[#2e4052] text-white">
  <div class="container mx-auto px-4 py-4 flex items-center justify-between">
    <a href="{% url 'home' %}" class="text-lg font-semibold">BookRank</a>

    <button id="menu-toggle"
            class="sm:hidden flex flex-col justify-between w-7 h-5 focus:outline-none"
            aria-label="Open main menu">
      <span class="block h-[2px] bg-white rounded"></span>
      <span class="block h-[2px] bg-white rounded"></span>
      <span class="block h-[2px] bg-white rounded"></span>
    </button>

    <div class="hidden sm:flex items-center gap-8">
      <ul class="flex items-center gap-8">
        <li><a href="/" class="hover:opacity-75">Top rated</a></li>
        <li><a href="/" class="hover:opacity-75">Best authors</a></li>
        <li><a href="/" class="hover:opacity-75">Explore</a></li>

        {% if user.is_authenticated %}
         <img class="rounded-full w-9 h-9 border border-black border-1" src="{{ user.profile.profile_picture.url }}" alt="avatar">
        {% else %}
        <li><a href="{% url 'register' %}" class="mt-3 px-3 py-2 hover:opacity-75">Sign in / Sign up</a></li>
        {% endif %}
      </ul>
    </div>
  </div>

  <div id="mobile-menu" class="sm:hidden hidden border-t border-white/10">
    <div class="container mx-auto px-4 pb-3 flex flex-col items-center">
      <ul class="flex flex-col w-full gap-3 pt-2 text-left items-center">
        <li class="w-full border-b-2 border-[#233445] pt-1 pb-2"><a class="block w-full h-full" href="/">Top rated</a></li>
        <li class="w-full border-b-2 border-[#233445] pt-1 pb-2"><a class="block w-full h-full" href="/">Best authors</a></li>
        <li class="w-full border-b-2 border-[#233445] pt-1 pb-2"><a class="block w-full h-full" href="/">Explore</a></li>

        {% if user.is_authenticated %}
        
        <li class="w-full border-b-2 border-[#233445] pt-1 pb-2">Profile</li>
        <li class="w-full text-center py-2"><a href="{% url 'logout' %}" class="text-red-400">Logout</a></li>
        
        {% else %}
        <li><a class="block px-3 py-2" href="{% url 'register' %}">Sign in / Sign up</a></li>
        {% endif %}
      </ul>
      
    </div>
  </div>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const toggleBtn = document.getElementById("menu-toggle");
    const mobileMenu = document.getElementById("mobile-menu");

    toggleBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });
  });
</script>

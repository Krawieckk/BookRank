{% for entry in user_library %}
    <div class="entry-item border-b border-gray-200 p-4 w-full max-w-[1200px] bg-white mt-6 sm:mt-10">
        <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 justify-between">
            
            <div class="flex flex-row gap-4 flex-1 min-w-0">
                <a href="{% url 'book_page' entry.book.id %}">
                    <div class="w-20 h-28 sm:w-32 sm:h-44 flex-shrink-0 overflow-hidden shadow-sm rounded-sm">
                        <img src="{{ entry.book.cover_image.url }}" alt="{{ entry.book.title }} Cover" class="w-full h-full object-fit">
                    </div>
                </a>

                <div class="flex flex-col justify-center items-start max-w min-w-0">
                    <a  href="{% url 'book_page' entry.book.id %}"
                        class="text-lg sm:text-xl font-semibold text-gray-900 leading-tight">
                        {{ entry.book.title }}
                    </a>
                    <p class="text-gray-500 text-xs sm:text-sm mt-1 leading-snug">
                        Authors: Angela C. Santomero, Traci Paige Johnson, Todd Kessler
                    </p>
                </div>
            </div>

            <div class="flex flex-col items-center sm:items-end gap-2 flex-shrink-0 w-full justify-center sm:w-max">
                
                <div class="flex flex-wrap sm:flex-col lg:flex-row gap-2 flex-grow sm:flex-grow-0 ">
                    <button hx-post="{% url 'update_library_status' entry_id=entry.id new_status='to_read' %}?filter={{ active_filter }}"
                            hx-target="#library-content"
                            hx-swap="innerHTML"
                            class="w-24 sm:w-32 px-1 sm:px-2 py-2 text-[10px] sm:text-sm font-medium border border-slate-800 transition-colors {% if entry.reading_status == 'to_read' %}bg-slate-800 text-white active{% endif %}">
                        To read
                    </button>
                    
                    <button hx-post="{% url 'update_library_status' entry_id=entry.id new_status='in_progress' %}?filter={{ active_filter }}"
                            hx-target="#library-content"
                            hx-swap="innerHTML"
                            class="w-24 sm:w-32 px-1 sm:px-2 py-2 text-[10px] sm:text-sm font-medium border border-slate-800 transition-colors {% if entry.reading_status == 'in_progress' %}bg-slate-800 text-white active{% endif %}">
                        In progress
                    </button>

                    <button hx-post="{% url 'update_library_status' entry_id=entry.id new_status='finished' %}?filter={{ active_filter }}"
                            hx-target="#library-content"
                            hx-swap="innerHTML"
                            class="w-24 sm:w-32 px-1 sm:px-2 py-2 text-[10px] sm:text-sm font-medium border border-slate-800 transition-colors {% if entry.reading_status == 'finished' %}bg-slate-800 text-white active{% endif %}">
                        Finished
                    </button>
                </div>

                <button hx-post="{% url 'delete_from_library' entry_id=entry.id %}?filter={{ active_filter }}"
                        hx-target="#library-content"
                        hx-swap="innerHTML"
                        hx-confirm="Are you sure you want to delete '{{entry.book.title}}' from your library?"
                        class="text-red-500 hover:text-red-700 text-xs font-semibold px-2 py-1">
                    Delete
                </button>
            </div>
        </div>
    </div>
{% empty %}
    <div class="p-8 text-center text-gray-500">
        No books found in your library.
    </div>
{% endfor %}

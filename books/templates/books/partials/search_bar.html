<div class="w-full flex flex-col justify-center items-center gap-5 px-4">
    <label for="search-input" class="text-sm sm:text-base">Search by title or the author</label>
    <div class="relative w-full max-w-[600px] text-sm">
        <input
        id="search-input"
        data-endpoint="{% url 'book_search_suggestions' %}"
        type="text"
        autocomplete="off"
        placeholder="Search..."
        class="w-full h-10 md:h-12 border border-gray-400 pl-4 outline-none focus:ring-2 focus:ring-gray-500 focus:border-gray-500"
        />
        <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-4.35-4.35m1.6-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <div
        id="search-results"
        class="hidden absolute z-50 w-full mt-2 bg-white border border-gray-200 shadow-lg overflow-hidden"
        role="listbox"
        aria-label="Search suggestions"
        ></div>
    </div>
</div>

<div class="space-y-4">
  {% for t in tags %}
    {% with t_id=t.id|stringformat:"s" %}
      <label class="flex cursor-pointer items-center gap-3">
        <input
          type="checkbox"
          name="tags"
          value="{{ t.id }}"
          class="h-4 w-4 border-slate-300 text-slate-900 focus:ring-slate-900"
          {% if t_id in selected_tags %}checked{% endif %}
        >
        <span class="text-sm">{{ t.name }}</span>
      </label>
    {% endwith %}
  {% empty %}
    <p class="text-sm text-slate-500">No tags found.</p>
  {% endfor %}
</div>

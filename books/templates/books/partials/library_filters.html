
<button hx-get="{% url 'library' %}?filter=all" 
        hx-target="#library-content"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="click throttle:1000ms"
        class="btn text-sm w-30 sm:w-36 py-2 border {% if active_filter == 'all' %}bg-[#2e4052] text-white active{% endif %}">All</button>

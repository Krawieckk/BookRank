<div class="space-y-4">
  {% for p in publishers %}
    {% with p_id=p.id|stringformat:"s" %}
      <label class="flex cursor-pointer items-center gap-3">
        <input
          type="checkbox"
          name="publishers"
          value="{{ p.id }}"
          class="h-4 w-4 border-slate-300 text-slate-900 focus:ring-slate-900"
          {% if p_id in selected_publishers %}checked{% endif %}
        >
        <span class="text-sm">{{ p.publisher_name }}</span>
      </label>
    {% endwith %}
  {% empty %}
    <p class="text-sm text-slate-500">No publishers found.</p>
  {% endfor %}
</div>
